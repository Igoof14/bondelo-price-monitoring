steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west3-docker.pkg.dev/$PROJECT_ID/poller/price-monitoring:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west3-docker.pkg.dev/$PROJECT_ID/poller/price-monitoring:$COMMIT_SHA

images:
  - europe-west3-docker.pkg.dev/$PROJECT_ID/poller/price-monitoring:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
